name: CI

# Build check for pull requests; required by branch protection before
# a PR (including Dependabot's) can merge into main.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a full commit SHA (the version tag is in the
      # comment) to prevent a hijacked/moved tag from running new code.
      # Dependabot (.github/dependabot.yml) keeps these SHAs up to date.
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
