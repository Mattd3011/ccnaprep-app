name: Deploy to GitHub Pages

on:
  # Build & deploy on every push to the main branch
  push:
    branches: [main]
  # Allow manually re-running the deploy from the Actions tab
  workflow_dispatch:

# Least privilege by default: every job starts read-only and only the
# job that needs more is granted it below.
permissions:
  contents: read

# Only one Pages deploy at a time; cancel older in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read # configure-pages reads the Pages site config
    steps:
      # Actions are pinned to a full commit SHA (the version tag is in the
      # comment) to prevent a hijacked/moved tag from running new code.
      # Dependabot (.github/dependabot.yml) keeps these SHAs up to date.
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # deploy the artifact to Pages
      id-token: write # OIDC token for the official deploy action
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
