name: Dependabot auto-merge

# Auto-merges Dependabot PRs for the github-actions ecosystem ONLY
# (official low-risk action bumps). npm updates always wait for a
# human, per .github/dependabot.yml cooldown + manual review.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'Mattd3011/ccnaprep-app'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # Auto-merge waits for the required CI check to pass; it does not
      # bypass it. Squash keeps main history one commit per bump.
      - name: Enable auto-merge for GitHub Actions bumps
        if: steps.metadata.outputs.package-ecosystem == 'github_actions'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
